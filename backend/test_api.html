<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CropCapital Backend Tester</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #0f0; padding: 40px; }
        h1 { border-bottom: 2px solid #0f0; padding-bottom: 10px; }
        .controls { margin: 20px 0; display: flex; gap: 20px; }
        button {
            padding: 15px 30px; font-size: 16px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 5px; transition: transform 0.2s;
        }
        .btn-good { background: #2ecc71; color: #000; }
        .btn-bad { background: #e74c3c; color: #fff; }
        button:hover { transform: scale(1.05); }
        
        #output {
            background: #000; border: 1px solid #333; padding: 20px;
            white-space: pre-wrap; margin-top: 20px; min-height: 200px;
            color: #fff; border-radius: 8px;
        }
        .status { color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🛰️ Backend Connection Tester</h1>
    <p class="status">Server Status: <span id="server-status">Check below...</span></p>

    <div class="controls">
        <button class="btn-good" onclick="testBackend('good')">✅ Test HEALTHY Farm</button>
        <button class="btn-bad" onclick="testBackend('bad')">❌ Test DRY Farm</button>
    </div>

    <h3>JSON Response from Python:</h3>
    <div id="output">Waiting for command...</div>

    <script>
        async function testBackend(type) {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = "📡 Sending signal to Python Backend...";
            outputDiv.style.color = "#ffff00"; // Yellow for loading

            try {
                // We send a POST request to your running Python server
                const response = await fetch('http://127.0.0.1:5000/analyze-farm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        lat: 20.5937, 
                        lng: 78.9629,
                        type: type // 'good' or 'bad'
                    })
                });

                const data = await response.json();

                // Make the JSON look pretty
                outputDiv.innerHTML = JSON.stringify(data, null, 4);
                outputDiv.style.color = "#fff"; // White for success

            } catch (error) {
                outputDiv.innerHTML = "❌ ERROR: Could not connect to Python.\nIs the server running?\n\nDetails: " + error;
                outputDiv.style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
